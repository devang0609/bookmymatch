<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMyMatch - Booking Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="./index.html" class="logo"><span>Book</span>MyMatch</a>
      <nav class="actions">
        <button class="chip dark">Mumbai</button>
        <button class="chip green">Login</button>
      </nav>
    </div>
  </header>

  <main class="container confirm-page">
    <section class="confirm-center">
      <div class="check-icon">✓</div>
      <h1>Booking Confirmed!</h1>
      <p class="subtitle">Your turf has been successfully booked</p>

      <article class="confirm-card">
        <div class="line top">
          <div>
            <p class="label">Booking ID</p>
            <p class="value booking-id" id="confirmBookingId">BMMEFB9C44</p>
          </div>
          <div>
            <p class="label">Status</p>
            <span class="status">CONFIRMED</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="line info">
          <p class="label">Turf Name</p>
          <p class="value" id="confirmTurf">Elite Cricket Hub</p>
        </div>
        <div class="line info">
          <p class="label">Date</p>
          <p class="value" id="confirmDate">Wednesday, April 15, 2026</p>
        </div>
        <div class="line info">
          <p class="label">Time Slot</p>
          <p class="value" id="confirmTime">6:00 AM</p>
        </div>

        <div class="divider"></div>

        <div class="line total">
          <p class="label">Total Paid</p>
          <p class="value amount" id="confirmAmount">₹3500</p>
        </div>
      </article>

      <div class="action-row">
        <button id="shareBtn" class="btn ghost" type="button">Share on WhatsApp</button>
        <button id="bookAnotherBtn" class="btn green" type="button">Book Another Match</button>
      </div>

      <p class="note">A confirmation has been saved. Please arrive 10 minutes early.</p>
    </section>
  </main>

  <script src="./confirmation.js"></script>
</body>

</html>
