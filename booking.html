<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMyMatch - Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="page-booking">
  <div class="container booking-app">
    <header class="home-header">
      <div class="home-header-brand">
        <a href="./index.html" class="home-logo"><span class="home-logo-book">Book</span>MyMatch</a>
        <p class="home-city" aria-label="City: Ahmedabad">
          <svg class="home-city-pin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          <span>Ahmedabad</span>
        </p>
      </div>
      <button type="button" class="home-login-btn">Login</button>
    </header>

    <nav class="booking-top-nav" aria-label="Breadcrumb">
      <a href="./turf-detail.html" class="booking-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" />
        </svg>
        Back to turf details
      </a>
    </nav>

    <main class="booking-page">
    <div class="booking-grid">
      <section class="booking-form-section">
        <div class="progress-row">
          <div class="step is-active"><span>1</span> Booking Details</div>
          <div class="step-line"></div>
          <div class="step"><span>2</span> Payment</div>
        </div>

        <h1>Complete Your Booking</h1>

        <div class="field-group">
          <h3>Select Date</h3>
          <div id="dateGrid" class="option-grid date-grid">
            <button class="option-btn active" type="button">Today</button>
            <button class="option-btn" type="button">Tomorrow</button>
            <button class="option-btn" type="button">Fri, Apr 17</button>
            <button class="option-btn" type="button">Sat, Apr 18</button>
            <button class="option-btn" type="button">Sun, Apr 19</button>
            <button class="option-btn" type="button">Mon, Apr 20</button>
            <button class="option-btn" type="button">Tue, Apr 21</button>
          </div>
        </div>

        <div class="field-group">
          <h3>Select Time Slot</h3>
          <div id="timeGrid" class="option-grid time-grid">
            <button class="option-btn active" type="button">6:00 AM</button>
            <button class="option-btn" type="button">7:00 AM</button>
            <button class="option-btn" type="button">8:00 AM</button>
            <button class="option-btn" type="button">9:00 AM</button>
            <button class="option-btn" type="button">10:00 AM</button>
            <button class="option-btn" type="button">11:00 AM</button>
            <button class="option-btn" type="button">12:00 PM</button>
            <button class="option-btn" type="button">1:00 PM</button>
            <button class="option-btn" type="button">2:00 PM</button>
            <button class="option-btn" type="button">3:00 PM</button>
            <button class="option-btn" type="button">4:00 PM</button>
            <button class="option-btn" type="button">5:00 PM</button>
            <button class="option-btn" type="button">6:00 PM</button>
            <button class="option-btn" type="button">7:00 PM</button>
            <button class="option-btn" type="button">8:00 PM</button>
            <button class="option-btn" type="button">9:00 PM</button>
            <button class="option-btn" type="button">10:00 PM</button>
          </div>
        </div>

        <div class="field-group">
          <h3>Contact Details</h3>
          <form id="bookingForm" class="contact-form" onsubmit="return false;">
            <input id="nameInput" type="text" placeholder="Full Name" />
            <input id="phoneInput" type="tel" placeholder="Phone Number" />
            <button id="paymentBtn" class="payment-btn" type="button">Proceed to Payment</button>
          </form>
        </div>
      </section>

      <aside class="booking-summary">
        <h2>Booking Summary</h2>
        <img src="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=1000&q=80" alt="Elite Cricket Hub" />
        <h3>Elite Cricket Hub</h3>
        <p class="city">Mumbai</p>
        <div class="summary-row"><span>Date</span><strong id="summaryDate">Apr 15, 2026</strong></div>
        <div class="summary-row"><span>Time</span><strong id="summaryTime">6:00 AM</strong></div>
        <div class="summary-row total"><span>Total</span><strong>₹3500</strong></div>
      </aside>
    </div>
    </main>
  </div>

  <script src="./booking.js"></script>
</body>
</html>
