<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookMyMatch - Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="page-profile">
  <div class="container profile-app">
    <header class="home-header">
      <div class="home-header-brand">
        <a href="./index.html" class="home-logo"><span class="home-logo-book">Book</span>MyMatch</a>
        <p class="home-city" aria-label="City: Ahmedabad">
          <svg class="home-city-pin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          <span>Ahmedabad</span>
        </p>
      </div>
      <button type="button" class="home-login-btn">Edit</button>
    </header>

    <main class="profile-page">
      <section class="profile-card">
        <img class="profile-avatar"
          src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=200&q=80"
          alt="Jack Ray" />
        <div class="profile-meta">
          <h1>Jack Ray</h1>
          <p>jackray@email.com <br> 8979879879</p>
          <span class="profile-badge">Premium Member</span>
        </div>
      </section>

      <section class="profile-section profile-coin" aria-labelledby="coin-heading">
        <div class="profile-coin-inner">
          <div class="profile-coin-icon" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="12" cy="7" rx="7.5" ry="2.6" stroke="currentColor" stroke-width="1.6" />
              <ellipse cx="12" cy="12" rx="7.5" ry="2.6" stroke="currentColor" stroke-width="1.6" />
              <ellipse cx="12" cy="17" rx="7.5" ry="2.6" stroke="currentColor" stroke-width="1.6" />
            </svg>
          </div>
          <div class="profile-coin-copy">
            <!-- <h2 id="coin-heading">BookMyCoins</h2> -->
            <p class="profile-coin-balance"><span class="profile-coin-amount">150</span> coins</p>
            <p class="profile-coin-hint">Earn on bookings · redeem on select turfs</p>
          </div>
          <!-- <a href="#" class="profile-coin-link">View history</a> -->
        </div>
      </section>

      <section class="profile-section">
        <h2>Quick Stats</h2>
        <div class="stats-grid">
          <article class="stats-card">
            <p class="value">24</p>
            <p class="label">Bookings</p>
          </article>
          <article class="stats-card">
            <p class="value">12</p>
            <p class="label">Matches</p>
          </article>
          <article class="stats-card">
            <p class="value">4.8</p>
            <p class="label">Rating</p>
          </article>
        </div>
      </section>

      <section class="profile-section">
        <h2>Account</h2>
        <div class="menu-list">
          <a href="./booking-list.html" class="menu-item"><span>My Bookings</span><span>›</span></a>
          <a href="./turf-list.html" class="menu-item"><span>Saved Turfs</span><span>›</span></a>
          <a href="./payment.html" class="menu-item"><span>Payment Methods</span><span>›</span></a>
          <a href="#" class="menu-item"><span>Support</span><span>›</span></a>
        </div>
      </section>
    </main>

    <nav class="home-bottom-nav" aria-label="Primary">
      <a class="nav-item" href="./index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Home
      </a>
      <a class="nav-item" href="./turf-list.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M9 9h6v6H9z" />
        </svg>
        Turfs
      </a>
      <a class="nav-item" href="./booking-list.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
          <line x1="7" y1="7" x2="7.01" y2="7" />
        </svg>
        Booking
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
        Inbox
      </a>
      <a class="nav-item is-active" href="./profile.html" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Profile
      </a>
    </nav>
  </div>
</body>

</html>
